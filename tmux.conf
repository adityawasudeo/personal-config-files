# --- Prefix ---
set -g prefix C-b
bind C-b send-prefix

# --- General ---
set -g history-limit 50000          # was 2000; enough for long build logs
set -g display-time 2000            # status messages stay visible longer
set -g focus-events on              # lets vim/neovim react to focus changes
set -sg escape-time 0               # no delay after Esc (important for vim)
set -g base-index 1                 # windows start at 1, not 0
setw -g pane-base-index 1           # panes start at 1 too
set -g renumber-windows on          # close window 2 → window 3 becomes 2

# --- Mouse ---
set -g mouse on                     # enable mouse: scroll, click to select pane/window

# --- Terminal & Colors ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"   # true color in SSH sessions

# --- Window / Pane Titles ---
set -g set-titles on
set -g set-titles-string "#S / #W"
setw -g automatic-rename on        # window title tracks running command

# --- Status Bar ---
set -g status-interval 5
set -g status-position bottom
set -g status-left-length 30
set -g status-right-length 60
set -g status-left  "[#S] "
set -g status-right " %H:%M %d-%b"

# Highlight active window in status bar
setw -g window-status-current-style fg=black,bg=cyan,bold

# --- Key Bindings ---
# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Split panes with intuitive keys (keep current directory)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current directory
bind c new-window -c "#{pane_current_path}"

# Move between windows with Shift+Arrow (no prefix needed)
bind -n S-Left  previous-window
bind -n S-Right next-window

# Move between panes with prefix + arrow (matches original Ctrl-b behavior)
bind -r Left  select-pane -L
bind -r Right select-pane -R
bind -r Up    select-pane -U
bind -r Down  select-pane -D

# Resize panes with prefix + Shift+arrow
bind -r S-Left  resize-pane -L 5
bind -r S-Right resize-pane -R 5
bind -r S-Up    resize-pane -U 5
bind -r S-Down  resize-pane -D 5

# --- Copy Mode ---
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi y   send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# Mouse scroll enters copy mode automatically (default in tmux 3.2+)
# Scroll speed: keep default (3 lines); override below if needed
# bind -T copy-mode-vi WheelUpPane   send -X scroll-up
# bind -T copy-mode-vi WheelDownPane send -X scroll-down
